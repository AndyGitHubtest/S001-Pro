# S001-Pro 定时任务配置
# 安装: crontab config/cron.conf

# 每小时检查一次交易对配置是否有变更，如有则自动重启服务
0 * * * * cd /home/ubuntu/strategies/S001-Pro && /home/ubuntu/strategies/S001-Pro/venv/bin/python tools/auto_pair_update.py --cron >> logs/auto_update.log 2>&1

# 每天 02:00 清理旧日志
0 2 * * * cd /home/ubuntu/strategies/S001-Pro && find logs -name "*.log" -mtime +7 -delete

# 每天 08:00 运行健康检查
0 8 * * * cd /home/ubuntu/strategies/S001-Pro && /home/ubuntu/strategies/S001-Pro/venv/bin/python tools/ghost_order_manager.py --check >> logs/health_check.log 2>&1
